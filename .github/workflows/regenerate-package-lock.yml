name: Regenerate package lock

on:
  push:
    branches: ["fix/regenerate-package-lock"]
  pull_request:
    branches: ["master"]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/regenerate-package-lock

      - uses: actions/setup-node@v7
        with:
          node-version: 22.x

      - name: Generate modern lockfile
        run: |
          rm -rf node_modules package-lock.json npm-install-error.log
          set +e
          npm install --package-lock-only --ignore-scripts > /tmp/npm-install.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cp /tmp/npm-install.log npm-install-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add npm-install-error.log
            git commit -m "chore: capture lockfile generation error"
            git push origin HEAD:fix/regenerate-package-lock
            tail -n 120 /tmp/npm-install.log
            exit "$status"
          fi

      - name: Verify lockfile format and ws patch
        run: |
          node <<'NODE'
          const lock = require('./package-lock.json');
          if ((lock.lockfileVersion ?? 0) < 3) {
            throw new Error(`Expected lockfileVersion >= 3, received ${lock.lockfileVersion}`);
          }

          const versions = new Set(
            Object.entries(lock.packages ?? {})
              .filter(([path]) => path === 'node_modules/ws' || path.endsWith('/node_modules/ws'))
              .map(([, metadata]) => metadata.version)
              .filter(Boolean)
          );

          console.log('Resolved ws versions:', [...versions].join(', ') || 'none');
          if (versions.has('8.20.0') || !versions.has('8.21.0')) {
            throw new Error('The regenerated lockfile did not replace ws 8.20.0 with 8.21.0.');
          }
          NODE

      - name: Verify clean installation
        run: npm ci

      - name: Verify build and tests
        run: |
          npm run build --if-present
          npm test

      - name: Commit regenerated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "Lockfile is already current."
            exit 0
          fi
          git commit -m "fix(deps): regenerate package lock"
          git push origin HEAD:fix/regenerate-package-lock
