<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#282C34"/>
      <stop offset="1" stop-color="#1C1E24"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg_grad)"/>
  
  <!-- List Structure -->
  <g filter="url(#shadow)">
    <!-- Top Bar (Primary Highlight) -->
    <rect x="120" y="140" width="272" height="48" rx="24" fill="#61DAFB"/>
    
    <!-- Middle Bar (Search/Filter Context) -->
    <rect x="120" y="232" width="180" height="48" rx="24" fill="#61DAFB" fill-opacity="0.7"/>
    <circle cx="340" cy="256" r="24" stroke="#61DAFB" stroke-width="8" stroke-opacity="0.7"/>
    <line x1="358" y1="274" x2="375" y2="291" stroke="#61DAFB" stroke-width="8" stroke-linecap="round" stroke-opacity="0.7"/>
    
    <!-- Bottom Bar (Pagination/Scroll Context) -->
    <rect x="120" y="324" width="272" height="48" rx="24" fill="#61DAFB" fill-opacity="0.4"/>
  </g>
  
  <!-- Subtle React Atom Orbits -->
  <ellipse cx="256" cy="256" rx="220" ry="90" transform="rotate(45 256 256)" stroke="#61DAFB" stroke-width="4" stroke-opacity="0.1"/>
  <ellipse cx="256" cy="256" rx="220" ry="90" transform="rotate(-45 256 256)" stroke="#61DAFB" stroke-width="4" stroke-opacity="0.1"/>
</svg>
